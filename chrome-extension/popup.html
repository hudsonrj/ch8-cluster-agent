<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; max-height: 520px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #f1f5f9; font-size: 12px; overflow-y: auto; }

    /* Header */
    .header { padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 8px; height: 8px; border-radius: 50%; background: #7c3aed; box-shadow: 0 0 6px #7c3aed; }
    .header-title { font-size: 13px; font-weight: 700; color: #f8fafc; }
    .header-status { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .status-ok { background: #064e3b; color: #34d399; }
    .status-err { background: #450a0a; color: #f87171; }

    /* Summary cards */
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; }
    .stat { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-value { font-size: 18px; font-weight: 700; color: #f8fafc; font-family: 'JetBrains Mono', monospace; }
    .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Nodes list */
    .section-title { padding: 8px 16px 4px; font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .nodes { padding: 0 12px 8px; }
    .node { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; }
    .node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .node-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-online { background: #10b981; box-shadow: 0 0 4px #10b981; }
    .dot-offline { background: #ef4444; }
    .node-name { font-size: 12px; font-weight: 600; color: #e2e8f0; flex: 1; }
    .node-meta { font-size: 9px; color: #64748b; }
    .node-bars { display: flex; gap: 8px; }
    .bar-group { flex: 1; }
    .bar-label { display: flex; justify-content: space-between; font-size: 9px; color: #94a3b8; margin-bottom: 2px; }
    .bar-track { height: 5px; background: #0f172a; border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .bar-cpu { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
    .bar-mem { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
    .bar-high { background: linear-gradient(90deg, #ef4444, #f87171) !important; }

    /* Agents row */
    .node-agents { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .agent-badge { font-size: 9px; padding: 1px 6px; border-radius: 4px; background: #312e81; color: #a5b4fc; }

    /* Command bar */
    .cmd-section { padding: 8px 12px 12px; border-top: 1px solid #334155; }
    .cmd-bar { display: flex; gap: 6px; }
    .cmd-input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 10px; color: #f8fafc; font-size: 11px; outline: none; font-family: 'JetBrains Mono', monospace; }
    .cmd-input:focus { border-color: #7c3aed; }
    .cmd-input::placeholder { color: #475569; }
    .cmd-btn { background: #7c3aed; border: none; border-radius: 6px; padding: 8px 12px; color: white; font-size: 11px; font-weight: 600; cursor: pointer; }
    .cmd-btn:hover { background: #6d28d9; }
    .cmd-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    .cmd-result { margin-top: 8px; padding: 8px 10px; background: #0f172a; border: 1px solid #1e293b; border-radius: 6px; font-size: 10px; color: #94a3b8; font-family: 'JetBrains Mono', monospace; max-height: 100px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; display: none; }

    /* Settings */
    .settings { padding: 8px 16px; border-top: 1px solid #334155; }
    .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .settings-row label { font-size: 10px; color: #94a3b8; width: 60px; }
    .settings-row input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 4px 8px; color: #f8fafc; font-size: 10px; outline: none; }
    .settings-row input:focus { border-color: #7c3aed; }
    .btn-sm { font-size: 9px; padding: 3px 8px; background: #334155; border: none; border-radius: 4px; color: #94a3b8; cursor: pointer; }
    .btn-sm:hover { background: #475569; color: #f8fafc; }

    /* Footer */
    .footer { padding: 6px 16px; text-align: center; font-size: 9px; color: #475569; border-top: 1px solid #1e293b; }

    /* Loading */
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo"></div>
    <span class="header-title">CH8 Cluster</span>
    <span class="header-status" id="status">...</span>
  </div>

  <div class="summary" id="summary">
    <div class="stat"><div class="stat-value" id="nodesOnline">-</div><div class="stat-label">Nodes</div></div>
    <div class="stat"><div class="stat-value" id="agentsCount">-</div><div class="stat-label">Agents</div></div>
    <div class="stat"><div class="stat-value" id="avgCpu">-</div><div class="stat-label">Avg CPU</div></div>
  </div>

  <div class="section-title">Nodes</div>
  <div class="nodes" id="nodes">
    <div class="loading"><span class="spin">&#9696;</span> Loading...</div>
  </div>

  <div class="cmd-section">
    <div class="section-title" style="padding:0 0 6px">Command</div>
    <div class="cmd-bar">
      <input class="cmd-input" id="cmdInput" placeholder="Ask cluster anything..." />
      <button class="cmd-btn" id="cmdBtn" onclick="sendCommand()">Send</button>
    </div>
    <div class="cmd-result" id="cmdResult"></div>
  </div>

  <div class="footer">
    <span id="lastUpdate">-</span> &middot; <button class="btn-sm" onclick="toggleSettings()">Settings</button> &middot; <button class="btn-sm" onclick="refresh()">Refresh</button>
  </div>

  <div class="settings" id="settingsPanel" style="display:none">
    <div class="settings-row">
      <label>Server</label>
      <input id="serverUrl" placeholder="https://control.ch8ai.com.br" />
    </div>
    <div class="settings-row">
      <label>Session</label>
      <input id="sessionKey" placeholder="session cookie value" type="password" />
    </div>
    <div class="settings-row" style="justify-content:flex-end">
      <button class="btn-sm" onclick="saveSettings()">Save</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
