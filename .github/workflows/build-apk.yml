name: Build Android APK

on:
  push:
    paths:
      - 'android-apk/**'
      - 'connect/**'
      - 'agents/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Prepare build directory
        run: |
          cd android-apk
          cp -r ../connect ./connect
          cp -r ../agents ./agents

      - name: Build APK
        run: |
          cd android-apk
          buildozer android debug 2>&1 | tee build.log
          ls -la bin/ 2>/dev/null || echo "No bin/ directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ch8-agent-apk
          path: android-apk/bin/*.apk
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android-apk/build.log
