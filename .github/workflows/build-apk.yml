name: Build Android APK

on:
  push:
    paths:
      - 'android-apk/**'
      - 'connect/**'
      - 'agents/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libncursesw5-dev \
            libtinfo-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            lld

      - name: Install buildozer and dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Prepare build directory
        run: |
          cd android-apk
          # Copy connect and agents modules into build dir
          cp -r ../connect ./connect
          cp -r ../agents ./agents

      - name: Build APK
        run: |
          cd android-apk
          buildozer android debug 2>&1 | tee build.log
          echo "Build completed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ch8-agent-apk
          path: android-apk/bin/*.apk
          if-no-files-found: warn

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android-apk/build.log
