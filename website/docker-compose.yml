version: '3.8'

services:
  ch8agent-website:
    build: .
    container_name: ch8agent-website
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
    networks:
      - web
    labels:
      - "com.ch8agent.description=CH8 Agent Landing Page (loopback only, fronted by nginx)"

networks:
  web:
    driver: bridge
