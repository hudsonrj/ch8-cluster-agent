# Nginx Proxy Reverso para CH8 Agent Website
# Coloque este arquivo em: /etc/nginx/sites-available/ch8agent.conf

server {
    listen 80;
    listen [::]:80;
    server_name ch8agent.ch8ai.com.br;

    # Logs
    access_log /var/log/nginx/ch8agent-access.log;
    error_log /var/log/nginx/ch8agent-error.log;

    # Proxy para container Docker na porta 8080
    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;

        # Headers de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (se necessário no futuro)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache de assets estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:8080;
        proxy_cache_valid 200 1y;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

