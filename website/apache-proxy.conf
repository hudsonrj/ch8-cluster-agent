# Apache Proxy Reverso para CH8 Agent Website
# Coloque este arquivo em: /etc/apache2/sites-available/ch8agent.conf

<VirtualHost *:80>
    ServerName ch8agent.ch8ai.com.br
    ServerAdmin admin@ch8ai.com.br

    # Logs
    ErrorLog ${APACHE_LOG_DIR}/ch8agent-error.log
    CustomLog ${APACHE_LOG_DIR}/ch8agent-access.log combined

    # Proxy para container Docker na porta 8080
    ProxyPreserveHost On
    ProxyPass / http://localhost:8080/
    ProxyPassReverse / http://localhost:8080/

    # Headers de segurança
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"

    # Cache de assets estáticos
    <LocationMatch "\.(css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=31536000, public, immutable"
    </LocationMatch>
</VirtualHost>

